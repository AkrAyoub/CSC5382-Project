run_name: symbolic_generator_model_comparison
random_seed: 42
evaluation:
  splits:
    - train
    - val
    - test
  exact_match_tolerance_pct: 1.0e-6
tracking:
  enable_mlflow: true
  enable_codecarbon: false
  experiment_name: milestone4-symbolic-comparison
comparison:
  candidate_names:
    - deterministic_baseline
    - llm_token_prompt_v0
    - llm_robust_prompt_v1
    - llm_fine_tuned
  llm_token_prompt_v0:
    enabled: true
    model_name: llama-3.1-8b-instant
    prompt_template: token_v0
    max_tokens: 650
  llm_robust_prompt_v1:
    enabled: true
    model_name: llama-3.1-8b-instant
    prompt_template: robust_v1
    max_tokens: 850
  llm_fine_tuned:
    enabled: false
    model_name: ""
    prompt_template: robust_v1
    max_tokens: 850
