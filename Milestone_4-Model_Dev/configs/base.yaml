run_name: symbolic_generator_baseline
random_seed: 42
candidate:
  name: deterministic_baseline
evaluation:
  splits:
    - train
    - val
    - test
  exact_match_tolerance_pct: 1.0e-6
tracking:
  enable_mlflow: true
  enable_codecarbon: false
  experiment_name: milestone4-symbolic-evaluation
  register_model: false
comparison:
  candidate_names:
    - deterministic_baseline
    - llm_token_prompt_v0
    - llm_robust_prompt_v1
  llm_fine_tuned:
    enabled: false
    model_name: ""
